monolog:
    channels:
        - deprecation # Deprecations are logged in the dedicated "deprecation" channel when it exists
        
        # 1. Define custom channels for specific logic
        - 'auth'          # Used for login/logout/registration logs
        - 'task_activity' # Used for all task CRUD operations (create, view, edit, delete)

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug
                # Exclude custom channels so they don't bloat the main dev.log
                channels: ["!event", "!auth", "!task_activity"]
                
            # 2. Create specific handlers for each channel to write to separate files
            auth_handler:
                type: stream
                path: "%kernel.logs_dir%/auth.log"
                level: debug
                channels: ["auth"]
                
            task_activity_handler:
                type: stream
                path: "%kernel.logs_dir%/task_activity.log"
                level: debug
                channels: ["task_activity"]

            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console"]

when@test:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!event"]
            nested:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: debug

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50 # How many messages should be saved? Prevent memory leaks
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
